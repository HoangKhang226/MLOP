name: MLOps Production-Ready CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  continuous-integration:
    runs-on: ubuntu-latest
    
    # Thiết lập PYTHONPATH để nhận diện thư mục src/
    env:
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
          cache: 'pip'

      - name: 3. Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest black
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install -e .

      - name: 4. Check Formatting (black)
        run: |
          black --check src

      - name: 5. Linting (flake8)
        run: |
          flake8 src --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 src --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: 6. Data Ingestion
        run: |
          python src/mlProject/pipeline/stage_01_data_ingestion.py

      - name: 7. Data Validation
        run: |
          python src/mlProject/pipeline/stage_02_data_validation.py

      - name: 8. Data Transformation
        run: |
          python src/mlProject/pipeline/stage_03_data_transformation.py

      - name: 9. Unit Testing (pytest)
        run: |
          pytest tests/

      - name: 10. Model Smoke Test
        run: |
          python -c "
          import os
          try:
              # Đảm bảo import đúng định dạng src.mlProject
              from src.mlProject.pipeline.prediction import PredictionPipeline
              print('>>> Prediction Pipeline module load check: Success')
          except Exception as e:
              print(f'>>> Smoke Test Failed: {e}')
          "
